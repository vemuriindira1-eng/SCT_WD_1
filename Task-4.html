<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Realistic To-Do App</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: "Segoe UI", sans-serif;
}

body{
  background:#f4f7fb;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:40px 20px;
  color:#333;
}

.container{
  width:100%;
  max-width:700px;
  background:#fff;
  border-radius:20px;
  padding:30px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.top-section{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

.top-section h1{
  font-size:32px;
  color:#222;
}

.task-count{
  background:#2563eb;
  color:white;
  padding:8px 14px;
  border-radius:10px;
  font-size:14px;
}

.input-section{
  display:grid;
  grid-template-columns:2fr 1fr auto;
  gap:12px;
  margin-bottom:25px;
}

.input-section input{
  padding:14px;
  border:1px solid #dcdcdc;
  border-radius:12px;
  font-size:15px;
  outline:none;
  transition:0.3s;
}

.input-section input:focus{
  border-color:#2563eb;
}

.add-btn{
  background:#2563eb;
  color:white;
  border:none;
  padding:14px 20px;
  border-radius:12px;
  cursor:pointer;
  font-size:15px;
  transition:0.3s;
}

.add-btn:hover{
  background:#1749b1;
}

.filter-section{
  display:flex;
  gap:10px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

.filter-btn{
  border:none;
  padding:10px 16px;
  border-radius:10px;
  background:#eef2ff;
  color:#2563eb;
  cursor:pointer;
  transition:0.3s;
}

.filter-btn.active{
  background:#2563eb;
  color:white;
}

.task-list{
  display:flex;
  flex-direction:column;
  gap:15px;
}

.task{
  background:#fafafa;
  border:1px solid #ececec;
  border-radius:16px;
  padding:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:0.3s;
}

.task:hover{
  transform:translateY(-2px);
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.task.completed{
  opacity:0.7;
}

.task.completed .task-title{
  text-decoration:line-through;
  color:#888;
}

.left{
  display:flex;
  gap:15px;
  align-items:flex-start;
}

.check{
  width:22px;
  height:22px;
  cursor:pointer;
  margin-top:3px;
}

.task-title{
  font-size:17px;
  font-weight:600;
}

.task-time{
  margin-top:6px;
  font-size:13px;
  color:#777;
}

.right{
  display:flex;
  gap:10px;
}

.action-btn{
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  font-size:14px;
  transition:0.3s;
}

.edit-btn{
  background:#fff4d6;
  color:#b7791f;
}

.delete-btn{
  background:#ffe2e2;
  color:#c92a2a;
}

.edit-btn:hover{
  background:#ffe8a3;
}

.delete-btn:hover{
  background:#ffc9c9;
}

.empty-state{
  text-align:center;
  color:#888;
  margin-top:40px;
}

@media(max-width:700px){

  .input-section{
    grid-template-columns:1fr;
  }

  .task{
    flex-direction:column;
    align-items:flex-start;
    gap:15px;
  }

  .right{
    width:100%;
  }

  .action-btn{
    flex:1;
  }

}

</style>
</head>

<body>

<div class="container">

  <div class="top-section">
    <h1>📝 My Tasks</h1>
    <div class="task-count" id="taskCount">0 Tasks</div>
  </div>

  <div class="input-section">

    <input type="text" id="taskInput" placeholder="Enter your task">

    <input type="datetime-local" id="taskDate">

    <button class="add-btn" onclick="addTask()">
      Add Task
    </button>

  </div>

  <div class="filter-section">

    <button class="filter-btn active" onclick="filterTasks('all', this)">
      All
    </button>

    <button class="filter-btn" onclick="filterTasks('completed', this)">
      Completed
    </button>

    <button class="filter-btn" onclick="filterTasks('pending', this)">
      Pending
    </button>

  </div>

  <div class="task-list" id="taskList">

    <div class="empty-state" id="emptyState">
      No tasks added yet 🚀
    </div>

  </div>

</div>

<script>

let currentFilter = "all";

function addTask(){

  const taskInput = document.getElementById("taskInput");
  const taskDate = document.getElementById("taskDate");

  const text = taskInput.value.trim();
  const date = taskDate.value;

  if(text === ""){
    alert("Please enter a task");
    return;
  }

  const taskList = document.getElementById("taskList");
  const emptyState = document.getElementById("emptyState");

  if(emptyState){
    emptyState.style.display = "none";
  }

  const task = document.createElement("div");
  task.className = "task";

  task.innerHTML = `

    <div class="left">

      <input type="checkbox" class="check">

      <div>

        <div class="task-title">${text}</div>

        <div class="task-time">
          ${date ? "⏰ " + formatDate(date) : "No deadline"}
        </div>

      </div>

    </div>

    <div class="right">

      <button class="action-btn edit-btn">
        ✏ Edit
      </button>

      <button class="action-btn delete-btn">
        🗑 Delete
      </button>

    </div>

  `;

  taskList.appendChild(task);

  const checkbox = task.querySelector(".check");
  const editBtn = task.querySelector(".edit-btn");
  const deleteBtn = task.querySelector(".delete-btn");

  checkbox.addEventListener("change", () => {
    task.classList.toggle("completed");
    updateCount();
    applyFilter();
  });

  editBtn.addEventListener("click", () => {

    const title = task.querySelector(".task-title");

    const updated = prompt("Edit your task", title.innerText);

    if(updated && updated.trim() !== ""){
      title.innerText = updated;
    }

  });

  deleteBtn.addEventListener("click", () => {

    task.remove();

    updateCount();

    checkEmpty();

  });

  taskInput.value = "";
  taskDate.value = "";

  updateCount();

  applyFilter();
}

function formatDate(date){

  const d = new Date(date);

  return d.toLocaleString();
}

function updateCount(){

  const total = document.querySelectorAll(".task").length;

  document.getElementById("taskCount").innerText =
    `${total} Task${total !== 1 ? "s" : ""}`;
}

function checkEmpty(){

  const tasks = document.querySelectorAll(".task");

  const emptyState = document.getElementById("emptyState");

  if(tasks.length === 0){
    emptyState.style.display = "block";
  }
}

function filterTasks(type, button){

  currentFilter = type;

  document.querySelectorAll(".filter-btn")
    .forEach(btn => btn.classList.remove("active"));

  button.classList.add("active");

  applyFilter();
}

function applyFilter(){

  const tasks = document.querySelectorAll(".task");

  tasks.forEach(task => {

    const completed = task.classList.contains("completed");

    switch(currentFilter){

      case "completed":
        task.style.display = completed ? "flex" : "none";
        break;

      case "pending":
        task.style.display = !completed ? "flex" : "none";
        break;

      default:
        task.style.display = "flex";
    }

  });

}

</script>

</body>
</html>
