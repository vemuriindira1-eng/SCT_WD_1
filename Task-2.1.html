<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Modern Calculator</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;

      background:linear-gradient(
        135deg,
        #0f0c29,
        #302b63,
        #24243e
      );

      overflow:hidden;
    }

    .calculator{
      width:360px;
      padding:25px;

      border-radius:25px;

      background:rgba(255,255,255,0.08);

      backdrop-filter:blur(12px);

      border:1px solid rgba(255,255,255,0.1);

      box-shadow:
      0 8px 32px rgba(0,0,0,0.45),
      0 0 25px rgba(124,77,255,0.25);

      position:relative;
    }

    .calculator::before{
      content:"";
      position:absolute;
      inset:-2px;

      border-radius:27px;
      padding:2px;

      pointer-events:none;

      background:linear-gradient(
        135deg,
        #00e5ff,
        #7c4dff,
        #ff4081
      );

      -webkit-mask:
      linear-gradient(#fff 0 0) content-box,
      linear-gradient(#fff 0 0);

      -webkit-mask-composite:xor;
      mask-composite:exclude;
    }

    .title{
      text-align:center;
      margin-bottom:20px;

      font-size:1.8rem;
      font-weight:700;

      background:linear-gradient(
        90deg,
        #00e5ff,
        #7c4dff,
        #ff4081
      );

      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .display{
      width:100%;
      height:80px;

      border:none;
      outline:none;

      border-radius:18px;

      margin-bottom:20px;
      padding:15px;

      font-size:2rem;
      text-align:right;

      background:rgba(255,255,255,0.08);
      color:white;

      box-shadow:
      inset 0 0 10px rgba(255,255,255,0.05),
      0 0 10px rgba(0,229,255,0.1);
    }

    .buttons{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:15px;
    }

    button{
      height:65px;

      border:none;
      border-radius:18px;

      font-size:1.2rem;
      font-weight:600;

      cursor:pointer;

      transition:0.25s ease;

      color:white;
    }

    button:hover{
      transform:translateY(-3px) scale(1.03);
    }

    button:active{
      transform:scale(0.95);
    }

    /* Number Buttons */
    .num{
      background:rgba(255,255,255,0.08);

      box-shadow:
      0 0 10px rgba(255,255,255,0.08);
    }

    /* Operator Buttons */
    .operator{
      background:linear-gradient(
        135deg,
        #7c4dff,
        #536dfe
      );

      box-shadow:
      0 0 15px rgba(124,77,255,0.4);
    }

    /* Equal Button */
    .equal{
      background:linear-gradient(
        135deg,
        #00e676,
        #00c853
      );

      box-shadow:
      0 0 15px rgba(0,230,118,0.4);

      grid-column:span 2;
    }

    /* Clear Button */
    .clear{
      background:linear-gradient(
        135deg,
        #ff1744,
        #d50000
      );

      box-shadow:
      0 0 15px rgba(255,23,68,0.4);
    }

    @media(max-width:450px){

      .calculator{
        width:92%;
      }

      button{
        height:60px;
      }

      .display{
        font-size:1.7rem;
      }
    }

  </style>
</head>

<body>

  <div class="calculator">

    <div class="title">🧮 Smart Calculator</div>

    <input type="text" class="display" id="display" readonly>

    <div class="buttons">

      <button class="clear" onclick="clearDisplay()">AC</button>
      <button class="operator" onclick="appendValue('/')">÷</button>
      <button class="operator" onclick="appendValue('*')">×</button>
      <button class="operator" onclick="deleteLast()">⌫</button>

      <button class="num" onclick="appendValue('7')">7</button>
      <button class="num" onclick="appendValue('8')">8</button>
      <button class="num" onclick="appendValue('9')">9</button>
      <button class="operator" onclick="appendValue('-')">−</button>

      <button class="num" onclick="appendValue('4')">4</button>
      <button class="num" onclick="appendValue('5')">5</button>
      <button class="num" onclick="appendValue('6')">6</button>
      <button class="operator" onclick="appendValue('+')">+</button>

      <button class="num" onclick="appendValue('1')">1</button>
      <button class="num" onclick="appendValue('2')">2</button>
      <button class="num" onclick="appendValue('3')">3</button>
      <button class="operator" onclick="appendValue('%')">%</button>

      <button class="num" onclick="appendValue('0')">0</button>
      <button class="num" onclick="appendValue('.')">.</button>

      <button class="equal" onclick="calculate()">=</button>

    </div>

  </div>

  <script>

    const display = document.getElementById("display");

    function appendValue(value){
      display.value += value;
    }

    function clearDisplay(){
      display.value = "";
    }

    function deleteLast(){
      display.value = display.value.slice(0,-1);
    }

    function calculate(){

      try{
        display.value = eval(display.value);
      }

      catch{
        display.value = "Error";
      }
    }

    // Keyboard Support
    document.addEventListener("keydown",(event)=>{

      const key = event.key;

      if(
        (key >= "0" && key <= "9") ||
        key === "+" ||
        key === "-" ||
        key === "*" ||
        key === "/" ||
        key === "." ||
        key === "%"
      ){
        appendValue(key);
      }

      else if(key === "Enter"){
        calculate();
      }

      else if(key === "Backspace"){
        deleteLast();
      }

      else if(key === "Escape"){
        clearDisplay();
      }

    });

  </script>

</body>
</html>
