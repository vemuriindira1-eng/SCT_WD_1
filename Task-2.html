<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advanced Stopwatch Web Application</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #020617, #0f172a, #1e293b, #312e81);
      overflow: hidden;
    }

    .container {
      width: 420px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 25px;
      padding: 35px 30px;
      text-align: center;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.45),
                  0 0 25px rgba(59,130,246,0.15);
      color: white;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 25px;
      letter-spacing: 1px;
    }

    .time {
      font-size: 3.4rem;
      text-shadow: 0 0 12px rgba(255,255,255,0.25);
      font-weight: 600;
      margin-bottom: 30px;
      letter-spacing: 2px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 22px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.3s ease;
      color: white;
    }

    #startBtn {
      background: #22c55e;
    }

    #pauseBtn {
      background: #f59e0b;
    }

    #resetBtn {
      background: #ef4444;
    }

    #lapBtn {
      background: #3b82f6;
    }

    button:hover {
      transform: translateY(-3px) scale(1.03);
      opacity: 0.9;
    }

    .laps {
      margin-top: 25px;
      max-height: 200px;
      overflow-y: auto;
      text-align: left;
      padding-right: 5px;
    }

    .laps::-webkit-scrollbar {
      width: 5px;
    }

    .laps::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.4);
      border-radius: 10px;
    }

    .lap-item {
      background: rgba(255, 255, 255, 0.1);
      padding: 10px 15px;
      margin-bottom: 10px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      font-size: 0.95rem;
    }

    @media (max-width: 500px) {
      .container {
        width: 92%;
        padding: 25px 20px;
      }

      .time {
        font-size: 2.4rem;
      }

      button {
        width: 100%;
      }

      .buttons {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>⏱ Smart Stopwatch Pro</h1>

    <div class="time" id="display">00:00:00:00</div>

    <div style="margin-top:10px; font-size:0.95rem; opacity:0.8;">
      Track time with milliseconds precision
    </div>

    <div class="buttons">
      <button id="startBtn">Start</button>
      <button id="pauseBtn">Pause</button>
      <button id="resetBtn">Reset</button>
      <button id="lapBtn">Lap</button>
    </div>

    <div class="laps" id="laps"></div>
  </div>

  <script>
    let milliseconds = 0;
    let seconds = 0;
    let minutes = 0;
    let hours = 0;
    let timer = null;
    let lapCount = 1;

    const display = document.getElementById('display');
    const laps = document.getElementById('laps');

    function updateDisplay() {
      let h = hours < 10 ? '0' + hours : hours;
      let m = minutes < 10 ? '0' + minutes : minutes;
      let s = seconds < 10 ? '0' + seconds : seconds;
      let ms = milliseconds < 10 ? '0' + milliseconds : milliseconds;

      display.innerText = `${h}:${m}:${s}:${ms}`;
    }

    function stopwatch() {
      milliseconds++;

      if (milliseconds === 100) {
        milliseconds = 0;
        seconds++;
      }

      if (seconds === 60) {
        seconds = 0;
        minutes++;
      }

      if (minutes === 60) {
        minutes = 0;
        hours++;
      }

      updateDisplay();
    }

    document.getElementById('startBtn').addEventListener('click', () => {
      if (timer !== null) return;
      timer = setInterval(stopwatch, 10);
    });

    document.getElementById('pauseBtn').addEventListener('click', () => {
      clearInterval(timer);
      timer = null;
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      clearInterval(timer);
      timer = null;

      milliseconds = 0;
      seconds = 0;
      minutes = 0;
      hours = 0;
      lapCount = 1;

      updateDisplay();
      laps.innerHTML = '';
    });

    document.getElementById('lapBtn').addEventListener('click', () => {
      if (hours === 0 && minutes === 0 && seconds === 0) return;

      const lap = document.createElement('div');
      lap.classList.add('lap-item');

      lap.innerHTML = `
        <span>Lap ${lapCount}</span>
        <span>${display.innerText}</span>
      `;

      laps.prepend(lap);
      lapCount++;
    });

    updateDisplay();
  </script>

</body>
</html>
