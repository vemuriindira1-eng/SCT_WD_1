<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colorful Tic Tac Toe</title>

<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
  }

  body{
    font-family: Arial, sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    color:white;
  }

  .container{
    text-align:center;
    background: rgba(255,255,255,0.1);
    padding:30px;
    border-radius:20px;
    backdrop-filter: blur(10px);
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
  }

  h1{
    margin-bottom:15px;
    font-size:40px;
    color:#fff;
  }

  #status{
    margin-bottom:20px;
    font-size:22px;
    color:#ffe066;
  }

  .board{
    display:grid;
    grid-template-columns:repeat(3,110px);
    gap:10px;
    justify-content:center;
    margin-bottom:20px;
  }

  .cell{
    width:110px;
    height:110px;
    background:white;
    border-radius:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:45px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    color:#333;
  }

  .cell:hover{
    transform:scale(1.05);
    background:#f1f1f1;
  }

  .x{
    color:#ff4d6d;
  }

  .o{
    color:#0077ff;
  }

  button{
    padding:12px 20px;
    margin:5px;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
    font-weight:bold;
  }

  .restart-btn{
    background:#00c853;
    color:white;
  }

  .restart-btn:hover{
    background:#00a844;
  }

  .mode-btn{
    background:#ff9800;
    color:white;
  }

  .mode-btn:hover{
    background:#e68900;
  }

</style>
</head>

<body>

<div class="container">

  <h1>🎮 Tic Tac Toe</h1>

  <h2 id="status">Player X's Turn</h2>

  <div class="board" id="board"></div>

  <button class="restart-btn" onclick="resetGame()">Restart Game</button>

  <button class="mode-btn" onclick="toggleMode()">Switch Mode</button>

</div>

<script>

let board = ["", "", "", "", "", "", "", "", ""];
let currentPlayer = "X";
let gameActive = true;
let vsComputer = false;

const winningConditions = [
  [0,1,2], [3,4,5], [6,7,8],
  [0,3,6], [1,4,7], [2,5,8],
  [0,4,8], [2,4,6]
];

const boardElement = document.getElementById("board");
const statusText = document.getElementById("status");

function createBoard() {

  boardElement.innerHTML = "";

  board.forEach((cell, index) => {

    const div = document.createElement("div");

    div.classList.add("cell");

    div.innerText = cell;

    if(cell === "X"){
      div.classList.add("x");
    }

    if(cell === "O"){
      div.classList.add("o");
    }

    div.addEventListener("click", () => handleClick(index));

    boardElement.appendChild(div);
  });
}

function handleClick(index) {

  if(board[index] !== "" || !gameActive) return;

  board[index] = currentPlayer;

  updateBoard();

  if(checkWinner()){

    statusText.innerText = `🎉 Player ${currentPlayer} Wins!`;

    gameActive = false;

    return;
  }

  if(!board.includes("")){

    statusText.innerText = "🤝 Match Draw!";

    gameActive = false;

    return;
  }

  currentPlayer = currentPlayer === "X" ? "O" : "X";

  statusText.innerText = `Player ${currentPlayer}'s Turn`;

  if(vsComputer && currentPlayer === "O"){

    setTimeout(computerMove, 500);
  }
}

function updateBoard() {

  const cells = document.querySelectorAll(".cell");

  cells.forEach((cell, index) => {

    cell.innerText = board[index];

    cell.classList.remove("x", "o");

    if(board[index] === "X"){
      cell.classList.add("x");
    }

    if(board[index] === "O"){
      cell.classList.add("o");
    }
  });
}

function checkWinner() {

  return winningConditions.some(condition => {

    return condition.every(index => board[index] === currentPlayer);
  });
}

function computerMove() {

  let emptyCells = board
    .map((val, idx) => val === "" ? idx : null)
    .filter(val => val !== null);

  let randomIndex = emptyCells[Math.floor(Math.random() * emptyCells.length)];

  handleClick(randomIndex);
}

function resetGame() {

  board = ["", "", "", "", "", "", "", "", ""];

  currentPlayer = "X";

  gameActive = true;

  statusText.innerText = "Player X's Turn";

  createBoard();
}

function toggleMode() {

  vsComputer = !vsComputer;

  resetGame();

  statusText.innerText = vsComputer
    ? "🤖 Vs Computer Mode"
    : "👥 Player vs Player Mode";
}

createBoard();

</script>

</body>
</html>
